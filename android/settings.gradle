pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id("com.android.application") version '8.13.2' apply false
    id("com.android.library") version '8.13.2' apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
    id "com.google.gms.google-services" version "4.3.15" apply false
}

include ":app"

// Force all Flutter plugins to use compileSdk 34+
gradle.beforeProject { project ->
    project.afterEvaluate {
        if (project.hasProperty('android')) {
            def android = project.android
            if (android.hasProperty('compileSdkVersion')) {
                def sdkVersion = android.compileSdkVersion
                def sdkInt = 0
                if (sdkVersion instanceof Integer) {
                    sdkInt = sdkVersion
                } else if (sdkVersion instanceof String) {
                    // Handle "android-XX" format
                    def match = sdkVersion =~ /(\d+)/
                    if (match) {
                        sdkInt = match[0][1] as Integer
                    }
                }
                if (sdkInt > 0 && sdkInt < 34) {
                    android.compileSdk = 34
                }
            }
        }
    }
}